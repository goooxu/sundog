    <line x1="515.2" y1="500" x2="515.2" y2="346.0"/><line x1="525.6" y1="500" x2="525.6" y2="363.3"/>
    <line x1="537.9" y1="500" x2="537.9" y2="392.3"/><line x1="555.5" y1="500" x2="555.5" y2="433.9"/>
    <line x1="594.2" y1="500" x2="594.2" y2="476.3"/><line x1="670.6" y1="500" x2="670.6" y2="480.8"/>
  </g>

  <polyline fill="none" stroke="#2563EB" stroke-width="2.5" points="70.0,480.8 86.0,480.8 102.0,480.8 118.0,480.8 134.0,480.8 150.0,480.8 166.0,480.8 182.0,480.8 198.0,480.8 214.0,480.8 230.0,480.8 246.0,480.8 262.0,480.8 278.0,480.8 294.0,480.8 310.0,480.8 326.0,480.8 342.0,480.8 358.0,480.8 374.0,480.7 382.0,480.6 390.0,480.4 398.0,479.8 406.0,478.8 414.0,477.0 422.0,473.8 430.0,468.7 438.0,461.0 446.0,450.0 454.0,435.7 462.0,418.2 470.0,398.6 478.0,378.7 486.0,360.8 494.0,347.5 502.0,340.6 510.0,341.4 518.0,349.7 526.0,364.1 534.0,382.6 542.0,402.6 550.0,421.9 558.0,438.8 566.0,452.5 574.0,462.8 582.0,469.9 590.0,474.6 598.0,477.4 606.0,479.1 614.0,480.0 622.0,480.4 630.0,480.6 646.0,480.8 662.0,480.8 678.0,480.8 694.0,480.8 710.0,480.8"/>
  <text x="502" y="326" text-anchor="middle" fill="#2563EB">f(x)</text>

  <!-- p ∝ f（虚线） -->
  <polyline fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,5" points="70.0,482.7 102.0,482.7 134.0,482.7 166.0,482.7 198.0,482.7 230.0,482.7 262.0,482.7 294.0,482.7 326.0,482.7 358.0,482.7 382.0,482.5 398.0,481.9 406.0,481.0 414.0,479.3 422.0,476.4 430.0,471.8 438.0,464.9 446.0,455.0 454.0,442.1 462.0,426.3 470.0,408.7 478.0,390.8 486.0,374.7 494.0,362.7 502.0,356.6 510.0,357.3 518.0,364.7 526.0,377.7 534.0,394.3 542.0,412.3 550.0,429.7 558.0,444.9 566.0,457.2 574.0,466.5 582.0,472.9 590.0,477.1 598.0,479.7 606.0,481.2 614.0,482.0 622.0,482.4 646.0,482.7 678.0,482.7 710.0,482.7"/>
  <text x="585" y="380" fill="#334155">p ∝ f（虚线）</text>

  <g fill="#F59E0B">
    <circle cx="109.4" cy="500" r="4.5"/><circle cx="188.5" cy="500" r="4.5"/><circle cx="267.5" cy="500" r="4.5"/>
    <circle cx="346.4" cy="500" r="4.5"/><circle cx="421.3" cy="500" r="4.5"/><circle cx="456.6" cy="500" r="4.5"/>
    <circle cx="473.6" cy="500" r="4.5"/><circle cx="485.8" cy="500" r="4.5"/><circle cx="496.0" cy="500" r="4.5"/>
    <circle cx="505.6" cy="500" r="4.5"/><circle cx="515.2" cy="500" r="4.5"/><circle cx="525.6" cy="500" r="4.5"/>
    <circle cx="537.9" cy="500" r="4.5"/><circle cx="555.5" cy="500" r="4.5"/><circle cx="594.2" cy="500" r="4.5"/>
    <circle cx="670.6" cy="500" r="4.5"/>
  </g>
  <text x="90" y="370" fill="#334155">样本聚集在贡献大的区域，</text>
  <text x="90" y="396" fill="#334155">每个样本 f/p ≈ 常数 → 方差小得多</text>

  <text x="380" y="556" text-anchor="middle" fill="#334155">p 越接近 f，f/p 的波动越小；极端情况 p ∝ f 时方差为零 —— 这就是重要性采样</text>
</svg>
