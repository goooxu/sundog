<svg xmlns="http://www.w3.org/2000/svg" width="760" height="580" viewBox="0 0 760 580"
     font-family="'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC','Microsoft YaHei',sans-serif" font-size="17">
  <defs>
    <marker id="arrS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="580" fill="#FFFFFF"/>

  <text x="380" y="24" text-anchor="middle" fill="#334155">MC 估计：(1/N) Σ f(X_k) / p(X_k)，样本 X_k 按 p 抽取 —— 两种 p 的对比</text>

  <!-- ====== 上图：均匀采样 ====== -->
  <text x="70" y="48" font-weight="bold" fill="#334155">均匀采样：p(x) = 常数</text>
  <line x1="70" y1="240" x2="716" y2="240" stroke="#334155" stroke-width="2" marker-end="url(#arrS)"/>
  <line x1="70" y1="240" x2="70" y2="62" stroke="#334155" stroke-width="2" marker-end="url(#arrS)"/>
  <text x="726" y="246" fill="#334155" font-style="italic">x</text>

  <!-- 样本竖杆（f(X_k) 的取值） -->
  <g stroke="#334155" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="90" y1="240" x2="90" y2="220.8"/><line x1="130" y1="240" x2="130" y2="220.8"/>
    <line x1="170" y1="240" x2="170" y2="220.8"/><line x1="210" y1="240" x2="210" y2="220.8"/>
