  <!-- 均匀 pdf（虚线） -->
  <line x1="70" y1="200" x2="710" y2="200" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="614" y="190" fill="#334155">p(x)（均匀）</text>

  <!-- 均匀样本点 -->
  <g fill="#F59E0B">
    <circle cx="90" cy="240" r="4.5"/><circle cx="130" cy="240" r="4.5"/><circle cx="170" cy="240" r="4.5"/>
    <circle cx="210" cy="240" r="4.5"/><circle cx="250" cy="240" r="4.5"/><circle cx="290" cy="240" r="4.5"/>
    <circle cx="330" cy="240" r="4.5"/><circle cx="370" cy="240" r="4.5"/><circle cx="410" cy="240" r="4.5"/>
    <circle cx="450" cy="240" r="4.5"/><circle cx="490" cy="240" r="4.5"/><circle cx="530" cy="240" r="4.5"/>
    <circle cx="570" cy="240" r="4.5"/><circle cx="610" cy="240" r="4.5"/><circle cx="650" cy="240" r="4.5"/>
    <circle cx="690" cy="240" r="4.5"/>
  </g>
  <text x="90" y="110" fill="#334155">大多数样本落在 f ≈ 0 的区域，</text>
  <text x="90" y="136" fill="#334155">少数碰上尖峰的样本主导结果 → 方差大</text>

  <!-- ====== 下图：重要性采样 ====== -->
  <text x="70" y="308" font-weight="bold" fill="#334155">重要性采样：p(x) ∝ f(x)</text>
  <line x1="70" y1="500" x2="716" y2="500" stroke="#334155" stroke-width="2" marker-end="url(#arrS)"/>
  <line x1="70" y1="500" x2="70" y2="322" stroke="#334155" stroke-width="2" marker-end="url(#arrS)"/>
  <text x="726" y="506" fill="#334155" font-style="italic">x</text>

  <g stroke="#334155" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="109.4" y1="500" x2="109.4" y2="480.8"/><line x1="188.5" y1="500" x2="188.5" y2="480.8"/>
    <line x1="267.5" y1="500" x2="267.5" y2="480.8"/><line x1="346.4" y1="500" x2="346.4" y2="480.8"/>
