    <line x1="570" y1="240" x2="570" y2="198.0"/><line x1="610" y1="240" x2="610" y2="219.6"/>
    <line x1="650" y1="240" x2="650" y2="220.8"/><line x1="690" y1="240" x2="690" y2="220.8"/>
  </g>

  <!-- 被积函数 f(x) -->
  <polyline fill="none" stroke="#2563EB" stroke-width="2.5" points="70.0,220.8 86.0,220.8 102.0,220.8 118.0,220.8 134.0,220.8 150.0,220.8 166.0,220.8 182.0,220.8 198.0,220.8 214.0,220.8 230.0,220.8 246.0,220.8 262.0,220.8 278.0,220.8 294.0,220.8 310.0,220.8 326.0,220.8 342.0,220.8 358.0,220.8 374.0,220.7 382.0,220.6 390.0,220.4 398.0,219.8 406.0,218.8 414.0,217.0 422.0,213.8 430.0,208.7 438.0,201.0 446.0,190.0 454.0,175.7 462.0,158.2 470.0,138.6 478.0,118.7 486.0,100.8 494.0,87.5 502.0,80.6 510.0,81.4 518.0,89.7 526.0,104.1 534.0,122.6 542.0,142.6 550.0,161.9 558.0,178.8 566.0,192.5 574.0,202.8 582.0,209.9 590.0,214.6 598.0,217.4 606.0,219.1 614.0,220.0 622.0,220.4 630.0,220.6 646.0,220.8 662.0,220.8 678.0,220.8 694.0,220.8 710.0,220.8"/>
