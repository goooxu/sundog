<svg xmlns="http://www.w3.org/2000/svg" width="900" height="665" viewBox="0 0 900 665" font-family="sans-serif">
  <defs>
    <marker id="ar-ray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="665" fill="#FFFFFF"/>

  <text x="24" y="36" font-size="20" font-weight="bold" fill="#334155">层次包围盒（BVH）：包围盒剪枝</text>
  <text x="24" y="80" font-size="17" fill="#64748B">场景（俯视）</text>

  <!-- ============ 场景：嵌套包围盒 ============ -->
  <rect x="78" y="94" width="605" height="214" fill="none" stroke="#2563EB" stroke-width="2.5"/>
  <text x="610" y="88" font-size="17" font-weight="bold" fill="#2563EB">R（根）</text>

  <!-- A 子树（被访问） -->
  <rect x="92" y="102" width="264" height="184" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="98" y="278" font-size="17" font-weight="bold" fill="#2563EB">A</text>

  <!-- A1（未命中，剪枝） -->
  <rect x="100" y="110" width="106" height="86" fill="none" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="104" y="126" font-size="16" fill="#94A3B8">A₁</text>
  <circle cx="153" cy="153" r="36" fill="#334155" fill-opacity="0.10" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="96" y="216" font-size="16" fill="#94A3B8">未与 A₁ 相交</text>

  <!-- A2（命中） -->
  <rect x="222" y="168" width="126" height="110" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="228" y="186" font-size="16" fill="#2563EB">A₂</text>
  <polygon points="232,268 285,178 338,268" fill="#F59E0B" fill-opacity="0.25" stroke="#334155" stroke-width="1.8"/>

  <!-- B 子树（整棵剪枝） -->
  <rect x="407" y="147" width="266" height="151" fill="#94A3B8" fill-opacity="0.10" stroke="#94A3B8" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="415" y="292" font-size="17" font-weight="bold" fill="#94A3B8">B</text>
  <rect x="415" y="155" width="110" height="100" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="421" y="173" font-size="16" fill="#94A3B8">B₁</text>
  <circle cx="470" cy="205" r="38" fill="#334155" fill-opacity="0.08" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="545" y="175" width="120" height="115" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="551" y="193" font-size="16" fill="#94A3B8">B₂</text>
  <polygon points="555,282 605,185 655,282" fill="#334155" fill-opacity="0.08" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="430" y="142" font-size="16" fill="#94A3B8">未与 B 相交 → 整棵子树跳过</text>

  <!-- 光线 -->
  <line x1="30" y1="300" x2="279.2" y2="187.8" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#ar-ray)"/>
  <line x1="279.2" y1="187.8" x2="487.8" y2="94" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <circle cx="279.2" cy="187.8" r="5" fill="#F59E0B" stroke="#334155" stroke-width="1.2"/>
  <text x="16" y="330" font-size="16" fill="#F59E0B" font-weight="bold">光线</text>
  <text x="298" y="152" font-size="16" fill="#334155">命中</text>

  <!-- ============ 对应二叉树 ============ -->
  <text x="24" y="352" font-size="17" fill="#64748B">对应的二叉树</text>

  <!-- 边 -->
  <line x1="445" y1="402" x2="275" y2="453" stroke="#2563EB" stroke-width="2"/>
  <line x1="455" y1="402" x2="625" y2="453" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="255" y1="487" x2="190" y2="538" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="285" y1="487" x2="350" y2="538" stroke="#2563EB" stroke-width="2"/>
  <line x1="615" y1="487" x2="550" y2="538" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="645" y1="487" x2="710" y2="538" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="698" y="514" font-size="16" fill="#94A3B8">剪枝</text>

  <!-- 节点 -->
  <rect x="415" y="368" width="70" height="34" rx="8" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB" stroke-width="2.5"/>
  <text x="450" y="391" font-size="17" font-weight="bold" fill="#2563EB" text-anchor="middle">R</text>
  <rect x="235" y="453" width="70" height="34" rx="8" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB" stroke-width="2.5"/>
  <text x="270" y="476" font-size="17" font-weight="bold" fill="#2563EB" text-anchor="middle">A</text>
  <rect x="595" y="453" width="70" height="34" rx="8" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="630" y="476" font-size="17" fill="#94A3B8" text-anchor="middle">B</text>
  <rect x="145" y="538" width="70" height="34" rx="8" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="180" y="561" font-size="17" fill="#94A3B8" text-anchor="middle">A₁</text>
  <rect x="325" y="538" width="70" height="34" rx="8" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB" stroke-width="2.5"/>
  <text x="360" y="561" font-size="17" font-weight="bold" fill="#2563EB" text-anchor="middle">A₂</text>
  <rect x="505" y="538" width="70" height="34" rx="8" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="540" y="561" font-size="17" fill="#94A3B8" text-anchor="middle">B₁</text>
  <rect x="685" y="538" width="70" height="34" rx="8" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="720" y="561" font-size="17" fill="#94A3B8" text-anchor="middle">B₂</text>

  <!-- 访问顺序 -->
  <circle cx="497" cy="366" r="13" fill="#F59E0B"/>
  <text x="497" y="372" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <circle cx="221" cy="449" r="13" fill="#F59E0B"/>
  <text x="221" y="455" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <circle cx="407" cy="536" r="13" fill="#F59E0B"/>
  <text x="407" y="542" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>

  <!-- 图例 -->
  <rect x="60" y="626" width="26" height="18" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB" stroke-width="2"/>
  <text x="96" y="641" font-size="16" fill="#334155">光线访问的节点</text>
  <rect x="290" y="626" width="26" height="18" fill="#94A3B8" fill-opacity="0.08" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="326" y="641" font-size="16" fill="#334155">剪枝跳过的节点</text>
  <circle cx="530" cy="635" r="12" fill="#F59E0B"/>
  <text x="530" y="641" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="552" y="641" font-size="16" fill="#334155">访问顺序</text>
</svg>
