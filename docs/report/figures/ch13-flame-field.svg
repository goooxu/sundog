<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="sans-serif">
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="20" y="32" font-size="20" font-weight="bold" fill="#334155">程序化火焰场的三层构造</text>

  <!-- panel 1: teardrop profile -->
  <text x="160" y="66" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563EB">① 泪滴轮廓</text>
  <!-- axis -->
  <line x1="160" y1="360" x2="160" y2="90" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M 160 100 C 172 150, 208 240, 208 296 C 208 336, 186 360, 160 360 C 134 360, 112 336, 112 296 C 112 240, 148 150, 160 100 Z"
        stroke="#334155" stroke-width="2.2" fill="#F59E0B" fill-opacity="0.10"/>
  <line x1="208" y1="296" x2="252" y2="296" stroke="#334155" stroke-width="1.4"/>
  <text x="256" y="301" font-size="14" fill="#64748B">最宽 h ≈ 0.24</text>
  <text x="160" y="390" text-anchor="middle" font-size="15" fill="#334155">r(h) = 3.2·√h·(1−h)¹·⁵⁵</text>
  <text x="160" y="410" text-anchor="middle" font-size="14" fill="#64748B">底部收窄 √h · 顶部锐化 (1−h)¹·⁵⁵</text>

  <!-- panel 2: fbm warped -->
  <text x="470" y="66" text-anchor="middle" font-size="16" font-weight="bold" fill="#B45309">② fbm 扰动边界</text>
  <path d="M 470 100 C 476 128, 462 142, 474 164 C 488 190, 508 206, 500 232 C 494 252, 522 268, 516 296 C 512 330, 494 360, 470 360 C 446 360, 430 338, 424 310 C 418 284, 440 272, 428 248 C 416 222, 438 206, 430 182 C 422 156, 462 132, 470 100 Z"
        stroke="#B45309" stroke-width="2.2" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="470" y="390" text-anchor="middle" font-size="15" fill="#334155">d′ = d / r(h) + (n − 0.45)·幅度</text>
  <text x="470" y="410" text-anchor="middle" font-size="14" fill="#64748B">噪声 y 向压缩 → 竖向拉长的火舌</text>

  <!-- panel 3: emission gradient -->
  <text x="780" y="66" text-anchor="middle" font-size="16" font-weight="bold" fill="#16A34A">③ 发射梯度</text>
  <path d="M 780 100 C 792 150, 828 240, 828 296 C 828 336, 806 360, 780 360 C 754 360, 732 336, 732 296 C 732 240, 768 150, 780 100 Z"
        fill="#DC2626" fill-opacity="0.55" stroke="none"/>
  <path d="M 780 150 C 789 190, 812 252, 812 298 C 812 330, 796 348, 780 348 C 764 348, 748 330, 748 298 C 748 252, 771 190, 780 150 Z"
        fill="#F59E0B" fill-opacity="0.85" stroke="none"/>
  <path d="M 780 205 C 786 235, 797 268, 797 300 C 797 324, 789 337, 780 337 C 771 337, 763 324, 763 300 C 763 268, 774 235, 780 205 Z"
        fill="#FDE68A" stroke="none"/>
  <path d="M 780 252 C 784 272, 789 288, 789 304 C 789 320, 785 328, 780 328 C 775 328, 771 320, 771 304 C 771 288, 776 272, 780 252 Z"
        fill="#FFFBEB" stroke="none"/>
  <g font-size="13" fill="#334155">
    <text x="846" y="300">红：heat¹</text>
    <text x="846" y="320">黄：heat²</text>
    <text x="846" y="340">白：heat³</text>
  </g>
  <text x="780" y="390" text-anchor="middle" font-size="15" fill="#334155">r/g/b = min(c·heatᵏ, 1)，k = 1/2/3</text>
  <text x="780" y="410" text-anchor="middle" font-size="14" fill="#64748B">黑体辐射的廉价近似：越热越白</text>
</svg>
