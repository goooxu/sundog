<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" font-family="sans-serif">
  <defs>
    <marker id="ar-ray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="470" fill="#FFFFFF"/>

  <text x="24" y="36" font-size="20" font-weight="bold" fill="#334155">光线与球求交：r(t) = o + t·d，代入 ‖p − C‖² = r²</text>

  <!-- ============ 左：主图 ============ -->
  <!-- 球 -->
  <circle cx="300" cy="220" r="110" fill="#2563EB" fill-opacity="0.12" stroke="#334155" stroke-width="2"/>
  <!-- 球心与半径 -->
  <circle cx="300" cy="220" r="4" fill="#334155"/>
  <text x="258" y="212" font-size="17" fill="#334155">C（球心）</text>
  <line x1="300" y1="220" x2="377.8" y2="297.8" stroke="#334155" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="348" y="262" font-size="17" font-style="italic" fill="#334155">r</text>

  <!-- 光线 -->
  <line x1="60" y1="330" x2="540" y2="157" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#ar-ray)"/>
  <circle cx="60" cy="330" r="4.5" fill="#334155"/>
  <text x="30" y="356" font-size="17" fill="#334155">o（起点）</text>
  <text x="96" y="292" font-size="17" fill="#334155">d（方向）</text>

  <!-- 交点 -->
  <circle cx="206" cy="277" r="5" fill="#2563EB"/>
  <line x1="198" y1="312" x2="204" y2="284" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="140" y="330" font-size="17" fill="#2563EB">t₀（入点）</text>
  <circle cx="409" cy="205" r="5" fill="#2563EB"/>
  <text x="416" y="232" font-size="17" fill="#2563EB">t₁（出点）</text>

  <!-- 底部说明 -->
  <text x="24" y="408" font-size="16" fill="#334155">遍历区间 [tmin, tmax] 内取最近正根 t₀ 作为可见交点；</text>
  <text x="24" y="434" font-size="16" fill="#334155">IS 程序把两个根都上报，供穿透面 / 玻璃内壁使用</text>

  <!-- 分隔线 -->
  <line x1="560" y1="60" x2="560" y2="440" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- ============ 右：判别式三种情形 ============ -->
  <text x="575" y="84" font-size="18" font-weight="bold" fill="#334155">判别式 Δ 的三种几何情形</text>

  <!-- Δ > 0 -->
  <circle cx="645" cy="130" r="40" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <line x1="575" y1="115" x2="700" y2="115" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ar-ray)"/>
  <circle cx="607.9" cy="115" r="4.5" fill="#2563EB"/>
  <circle cx="682.1" cy="115" r="4.5" fill="#2563EB"/>
  <text x="712" y="122" font-size="17" fill="#334155">Δ &gt; 0</text>
  <text x="712" y="146" font-size="16" fill="#334155">两个交点 t₀ ≠ t₁</text>

  <!-- Δ = 0 -->
  <circle cx="645" cy="255" r="40" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <line x1="575" y1="215" x2="700" y2="215" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ar-ray)"/>
  <circle cx="645" cy="215" r="4.5" fill="#2563EB"/>
  <text x="712" y="247" font-size="17" fill="#334155">Δ = 0</text>
  <text x="712" y="271" font-size="16" fill="#334155">相切，t₀ = t₁</text>

  <!-- Δ < 0 -->
  <circle cx="645" cy="380" r="40" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <line x1="575" y1="325" x2="700" y2="325" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ar-ray)"/>
  <text x="712" y="372" font-size="17" fill="#334155">Δ &lt; 0</text>
  <text x="712" y="396" font-size="16" fill="#334155">未命中</text>
</svg>
