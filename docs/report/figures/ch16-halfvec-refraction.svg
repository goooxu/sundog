<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#ffffff"/>
  <text x="20" y="32" font-size="20" font-weight="bold" fill="#334155">半程向量：反射的角平分线，透射的 η 加权和</text>

  <!-- ================= left panel: reflection ================= -->
  <text x="235" y="70" text-anchor="middle" font-size="17" fill="#334155">反射　h ∝ ω_o + ω_i</text>

  <!-- microfacet tangent plane (tilted) -->
  <line x1="90" y1="330" x2="390" y2="290" stroke="#334155" stroke-width="2.5"/>
  <rect x="90" y="330" width="310" height="60" transform="rotate(-7.4 90 330)" fill="#94A3B8" fill-opacity="0.12" stroke="none"/>
  <text x="355" y="325" font-size="14" fill="#64748B">微镜面</text>

  <!-- facet normal h (green, from midpoint, perpendicular to facet) -->
  <line x1="240" y1="310" x2="256" y2="190" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="262" y="185" font-size="16" fill="#16A34A">h</text>

  <!-- wo (orange, up-left) and wi (orange, up-right), mirrored about h -->
  <line x1="240" y1="310" x2="120" y2="150" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="100" y="145" font-size="16" fill="#F59E0B">ω_o</text>
  <line x1="240" y1="310" x2="392" y2="182" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="398" y="180" font-size="16" fill="#F59E0B">ω_i</text>

  <!-- equal-angle arcs -->
  <path d="M 210 268 A 52 52 0 0 1 252 258" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <path d="M 258 258 A 52 52 0 0 1 286 272" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <text x="228" y="248" font-size="13" fill="#64748B">θ</text>
  <text x="272" y="250" font-size="13" fill="#64748B">θ</text>

  <text x="235" y="440" text-anchor="middle" font-size="14" fill="#334155">h 是 ω_o 与 ω_i 的角平分线：</text>
  <text x="235" y="462" text-anchor="middle" font-size="14" fill="#334155">能把 ω_o 镜到 ω_i 的那面微镜</text>

  <!-- ================= right panel: refraction ================= -->
  <text x="705" y="70" text-anchor="middle" font-size="17" fill="#334155">透射　h ∝ η·ω_o + ω_i（相对 η = η_o/η_i）</text>

  <!-- interface plane (horizontal) + media fills -->
  <rect x="530" y="120" width="350" height="140" fill="#94A3B8" fill-opacity="0.10"/>
  <rect x="530" y="260" width="350" height="140" fill="#2563EB" fill-opacity="0.12"/>
  <line x1="530" y1="260" x2="880" y2="260" stroke="#334155" stroke-width="2.5"/>
  <text x="545" y="142" font-size="14" fill="#64748B">η_o（如真空 1.0）</text>
  <text x="545" y="390" font-size="14" fill="#2563EB">η_i（如玻璃 1.5）</text>

  <!-- facet normal h (green, up from hit point) -->
  <line x1="705" y1="260" x2="705" y2="140" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="712" y="140" font-size="16" fill="#16A34A">h</text>

  <!-- wo above (orange), wi below refracted toward normal (orange) -->
  <line x1="705" y1="260" x2="580" y2="150" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="560" y="145" font-size="16" fill="#F59E0B">ω_o</text>
  <line x1="705" y1="260" x2="775" y2="392" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="782" y="398" font-size="16" fill="#F59E0B">ω_i</text>

  <!-- Snell angle arcs -->
  <path d="M 705 218 A 42 42 0 0 0 672 231" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <text x="668" y="212" font-size="13" fill="#64748B">θ_o</text>
  <path d="M 705 302 A 42 42 0 0 0 728 296" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <text x="730" y="318" font-size="13" fill="#64748B">θ_i</text>

  <!-- construction: eta*wo + wi resultant (blue dashed) pointing along -h -->
  <line x1="705" y1="260" x2="705" y2="352" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrB)"/>
  <text x="713" y="350" font-size="14" fill="#2563EB">η·ω_o + ω_i ∥ −h</text>

  <text x="705" y="440" text-anchor="middle" font-size="14" fill="#334155">η 加权和与 h 反向平行：能按 Snell 把 ω_o 折到 ω_i 的微镜；</text>
  <text x="705" y="462" text-anchor="middle" font-size="14" fill="#334155">超过临界角时 refract 失败 → 微镜面级 TIR，确定性反射</text>
</svg>
