<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470"
     font-family="'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC','Microsoft YaHei',sans-serif" font-size="17">
  <defs>
    <marker id="arrO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#FFFFFF"/>

  <!-- 场景物体：竖直箭头（尖端朝上） -->
  <line x1="150" y1="320" x2="150" y2="152" stroke="#2563EB" stroke-width="5" marker-end="url(#arrB)"/>
  <text x="150" y="352" text-anchor="middle" fill="#334155">场景物体</text>

  <!-- 暗箱：左壁在 x=470，针孔在 (470,240) -->
  <path d="M470,100 H810 V380 H470 V252 M470,228 V100" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="470" cy="228" r="3" fill="#334155"/>
  <circle cx="470" cy="252" r="3" fill="#334155"/>

  <!-- 针孔标注 -->
  <text x="452" y="155" text-anchor="end" fill="#334155">针孔</text>
  <line x1="448" y1="163" x2="466" y2="226" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- 成像平面：带像素网格的斜视平面（前边缘 x=760） -->
  <g stroke="#334155" stroke-width="1">
    <polygon points="760,150 800,132 800,332 760,350" fill="#2563EB" fill-opacity="0.10"/>
    <line x1="770" y1="145.5" x2="770" y2="345.5"/>
    <line x1="780" y1="141" x2="780" y2="341"/>
    <line x1="790" y1="136.5" x2="790" y2="336.5"/>
    <line x1="760" y1="175" x2="800" y2="157"/>
    <line x1="760" y1="200" x2="800" y2="182"/>
    <line x1="760" y1="225" x2="800" y2="207"/>
    <line x1="760" y1="250" x2="800" y2="232"/>
    <line x1="760" y1="275" x2="800" y2="257"/>
    <line x1="760" y1="300" x2="800" y2="282"/>
    <line x1="760" y1="325" x2="800" y2="307"/>
  </g>
  <polygon points="760,150 800,132 800,332 760,350" fill="none" stroke="#334155" stroke-width="2"/>
  <text x="638" y="128" text-anchor="middle" fill="#334155">成像平面（像素网格）</text>
  <line x1="722" y1="132" x2="756" y2="148" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- 两条光线：物体顶端/底端 → 针孔 → 成像平面（穿孔直线） -->
  <line x1="150" y1="152" x2="760" y2="323.6" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrO)"/>
  <line x1="150" y1="320" x2="760" y2="167.5" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrO)"/>
  <text x="285" y="182" text-anchor="middle" fill="#B45309">光线</text>

  <!-- 倒像：蓝色箭头指向下（物体尖端映射到下方） -->
  <line x1="735" y1="170" x2="735" y2="318" stroke="#2563EB" stroke-width="4" marker-end="url(#arrB)"/>
  <text x="675" y="362" text-anchor="middle" fill="#2563EB">倒像（上下颠倒）</text>

  <!-- 底部说明 -->
  <text x="450" y="440" text-anchor="middle" fill="#334155">每个像素只接收沿一条直线穿过针孔的光 —— 像清晰，但进光量极小</text>
</svg>
