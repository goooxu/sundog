<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500"
     font-family="'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC','Microsoft YaHei',sans-serif" font-size="17">
  <defs>
    <marker id="arrO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="500" fill="#FFFFFF"/>

  <!-- 地面 -->
  <line x1="60" y1="400" x2="880" y2="400" stroke="#334155" stroke-width="3"/>
  <rect x="60" y="400" width="820" height="18" fill="#334155" fill-opacity="0.08"/>

  <!-- 相机 -->
  <rect x="60" y="268" width="70" height="46" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="2"/>
  <circle cx="134" cy="291" r="9" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
  <text x="95" y="340" text-anchor="middle" fill="#334155">相机</text>

  <!-- 面光源 -->
  <rect x="180" y="60" width="180" height="28" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
  <text x="270" y="46" text-anchor="middle" fill="#B45309">面光源 L_e</text>

  <!-- 玻璃球 -->
  <circle cx="590" cy="260" r="75" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="2.5"/>
  <text x="682" y="266" fill="#334155">玻璃球</text>

  <!-- 路径段 1：相机 → 漫反射点 -->
  <line x1="142" y1="296" x2="296" y2="397" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="185" y="368" text-anchor="middle" fill="#B45309">β = 1</text>

  <!-- 漫反射点 P1 -->
  <circle cx="300" cy="400" r="5.5" fill="#334155"/>
  <text x="300" y="440" text-anchor="middle" fill="#334155">漫反射点：β ← β · f_r cosθ / p</text>

  <!-- NEE shadow ray（虚线） -->
  <line x1="300" y1="400" x2="221" y2="94" stroke="#F59E0B" stroke-width="1.8" stroke-dasharray="7,6" marker-end="url(#arrO)"/>
  <text x="238" y="206" text-anchor="end" fill="#B45309">NEE shadow ray</text>
  <text x="238" y="230" text-anchor="end" fill="#B45309">（直接采样灯上一点）</text>

  <!-- 路径段 2：漫反射点 → 玻璃球 -->
  <line x1="300" y1="400" x2="527" y2="310" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>

  <!-- 玻璃内部段 + 出射折射段 -->
  <circle cx="532" cy="308" r="3.5" fill="#334155"/>
  <circle cx="601" cy="186" r="3.5" fill="#334155"/>
  <line x1="532" y1="308" x2="601" y2="186" stroke="#F59E0B" stroke-width="2"/>
  <line x1="601" y1="186" x2="352" y2="92" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="590" y="110" text-anchor="middle" fill="#B45309">折射两次：β ← β · 折射权重（含菲涅尔）</text>

  <!-- 命中光源 -->
  <text x="560" y="60" text-anchor="middle" fill="#334155">命中光源：贡献 += β · L_e · w_MIS</text>
  <line x1="445" y1="66" x2="360" y2="86" stroke="#334155" stroke-width="1.3"/>

  <!-- 底注 -->
  <text x="470" y="478" text-anchor="middle" fill="#334155">一条路径：相机 → 漫反射（顺带 NEE）→ 玻璃球折射 → 命中面光源；吞吐量 β 累积每段衰减</text>
</svg>
