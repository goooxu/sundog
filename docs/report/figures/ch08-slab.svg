<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="sans-serif">
  <defs>
    <marker id="ar-ray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="ar-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#FFFFFF"/>

  <text x="24" y="36" font-size="20" font-weight="bold" fill="#334155">平板法（slab test）：光线-AABB 求交（2D 示意）</text>

  <!-- ============ 场景：两对平板与 AABB ============ -->
  <!-- x 平板 -->
  <rect x="260" y="70" width="220" height="290" fill="#2563EB" fill-opacity="0.07"/>
  <line x1="260" y1="70" x2="260" y2="360" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="480" y1="70" x2="480" y2="360" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="370" y="90" font-size="16" fill="#2563EB" text-anchor="middle">x 平板</text>

  <!-- y 平板 -->
  <rect x="90" y="120" width="600" height="140" fill="#10B981" fill-opacity="0.08"/>
  <line x1="90" y1="120" x2="690" y2="120" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="90" y1="260" x2="690" y2="260" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="646" y="196" font-size="16" fill="#10B981">y 平板</text>

  <!-- AABB = 两平板的交 -->
  <rect x="260" y="120" width="220" height="140" fill="none" stroke="#2563EB" stroke-width="2.5"/>
  <text x="272" y="146" font-size="16" font-weight="bold" fill="#2563EB">AABB</text>

  <!-- 光线 o + t·d -->
  <line x1="80" y1="320" x2="640" y2="96" stroke="#F59E0B" stroke-width="2" marker-end="url(#ar-ray)"/>
  <line x1="260" y1="248" x2="480" y2="160" stroke="#F59E0B" stroke-width="5" stroke-opacity="0.85"/>
  <circle cx="80" cy="320" r="4" fill="#F59E0B" stroke="#334155" stroke-width="1.2"/>
  <text x="66" y="345" font-size="16" fill="#F59E0B" font-weight="bold">光线 o + t·d</text>

  <!-- 交点与标注 -->
  <circle cx="230" cy="260" r="4" fill="#10B981"/>
  <text x="222" y="284" font-size="16" fill="#10B981">t<tspan dy="4" font-size="11">y</tspan><tspan dy="-11" font-size="11">−</tspan></text>
  <circle cx="260" cy="248" r="5" fill="#2563EB"/>
  <text x="248" y="232" font-size="16" fill="#2563EB" text-anchor="end">t<tspan dy="4" font-size="11">x</tspan><tspan dy="-11" font-size="11">−</tspan><tspan dy="7"> = t</tspan><tspan dy="4" font-size="11">enter</tspan></text>
  <circle cx="480" cy="160" r="5" fill="#2563EB"/>
  <text x="494" y="148" font-size="16" fill="#2563EB">t<tspan dy="4" font-size="11">x</tspan><tspan dy="-11" font-size="11">+</tspan><tspan dy="7"> = t</tspan><tspan dy="4" font-size="11">exit</tspan></text>
  <circle cx="580" cy="120" r="4" fill="#10B981"/>
  <text x="586" y="144" font-size="16" fill="#10B981">t<tspan dy="4" font-size="11">y</tspan><tspan dy="-11" font-size="11">+</tspan></text>

  <!-- ============ 沿 t 轴的区间求交 ============ -->
  <text x="24" y="398" font-size="17" fill="#64748B">沿光线参数 t 的区间求交</text>

  <!-- 竖直参考线：t_enter 与 t_exit -->
  <line x1="312" y1="410" x2="312" y2="548" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="571" y1="410" x2="571" y2="548" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- x 平板区间 -->
  <text x="300" y="435" font-size="15" fill="#2563EB" text-anchor="end">x 平板区间</text>
  <line x1="312" y1="430" x2="571" y2="430" stroke="#2563EB" stroke-width="4"/>
  <line x1="312" y1="422" x2="312" y2="438" stroke="#2563EB" stroke-width="2"/>
  <line x1="571" y1="422" x2="571" y2="438" stroke="#2563EB" stroke-width="2"/>

  <!-- y 平板区间 -->
  <text x="265" y="477" font-size="15" fill="#10B981" text-anchor="end">y 平板区间</text>
  <line x1="277" y1="472" x2="689" y2="472" stroke="#10B981" stroke-width="4"/>
  <line x1="277" y1="464" x2="277" y2="480" stroke="#10B981" stroke-width="2"/>
  <line x1="689" y1="464" x2="689" y2="480" stroke="#10B981" stroke-width="2"/>

  <!-- 交集 -->
  <text x="300" y="519" font-size="15" fill="#F59E0B" text-anchor="end" font-weight="bold">交集</text>
  <line x1="312" y1="514" x2="571" y2="514" stroke="#F59E0B" stroke-width="5"/>
  <line x1="312" y1="506" x2="312" y2="522" stroke="#F59E0B" stroke-width="2"/>
  <line x1="571" y1="506" x2="571" y2="522" stroke="#F59E0B" stroke-width="2"/>
  <text x="585" y="519" font-size="15" fill="#F59E0B" font-weight="bold">非空 ⇒ 穿盒</text>

  <!-- t 轴 -->
  <line x1="100" y1="560" x2="780" y2="560" stroke="#64748B" stroke-width="1.8" marker-end="url(#ar-axis)"/>
  <text x="790" y="565" font-size="16" fill="#64748B">t</text>
  <line x1="100" y1="554" x2="100" y2="566" stroke="#64748B" stroke-width="1.5"/>
  <text x="100" y="584" font-size="14" fill="#64748B" text-anchor="middle">0</text>
  <line x1="277" y1="554" x2="277" y2="566" stroke="#10B981" stroke-width="1.5"/>
  <text x="272" y="584" font-size="14" fill="#10B981" text-anchor="middle">t<tspan dy="3" font-size="10">y</tspan><tspan dy="-9" font-size="10">−</tspan></text>
  <line x1="312" y1="554" x2="312" y2="566" stroke="#2563EB" stroke-width="1.5"/>
  <text x="318" y="584" font-size="14" fill="#2563EB" text-anchor="middle">t<tspan dy="3" font-size="10">x</tspan><tspan dy="-9" font-size="10">−</tspan></text>
  <line x1="571" y1="554" x2="571" y2="566" stroke="#2563EB" stroke-width="1.5"/>
  <text x="571" y="584" font-size="14" fill="#2563EB" text-anchor="middle">t<tspan dy="3" font-size="10">x</tspan><tspan dy="-9" font-size="10">+</tspan></text>
  <line x1="689" y1="554" x2="689" y2="566" stroke="#10B981" stroke-width="1.5"/>
  <text x="689" y="584" font-size="14" fill="#10B981" text-anchor="middle">t<tspan dy="3" font-size="10">y</tspan><tspan dy="-9" font-size="10">+</tspan></text>

  <!-- 结论 -->
  <text x="100" y="620" font-size="15" fill="#334155">t<tspan dy="4" font-size="11">enter</tspan><tspan dy="-4"> = max(t</tspan><tspan dy="4" font-size="11">x</tspan><tspan dy="-11" font-size="11">−</tspan><tspan dy="7">, t</tspan><tspan dy="4" font-size="11">y</tspan><tspan dy="-11" font-size="11">−</tspan><tspan dy="7">, t</tspan><tspan dy="4" font-size="11">min</tspan><tspan dy="-4">)，　t</tspan><tspan dy="4" font-size="11">exit</tspan><tspan dy="-4"> = min(t</tspan><tspan dy="4" font-size="11">x</tspan><tspan dy="-11" font-size="11">+</tspan><tspan dy="7">, t</tspan><tspan dy="4" font-size="11">y</tspan><tspan dy="-11" font-size="11">+</tspan><tspan dy="7">, t</tspan><tspan dy="4" font-size="11">max</tspan><tspan dy="-4">)，当且仅当 t</tspan><tspan dy="4" font-size="11">enter</tspan><tspan dy="-4"> ≤ t</tspan><tspan dy="4" font-size="11">exit</tspan><tspan dy="-4"> 时相交</tspan></text>
</svg>
