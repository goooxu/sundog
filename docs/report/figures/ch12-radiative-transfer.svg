<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <rect width="940" height="420" fill="#ffffff"/>
  <text x="20" y="32" font-size="20" font-weight="bold" fill="#334155">辐射传输：光线穿过发射-吸收介质</text>

  <!-- medium blob -->
  <ellipse cx="470" cy="150" rx="180" ry="72" stroke="#B45309" stroke-dasharray="6 4" stroke-width="2" fill="#F59E0B" fill-opacity="0.10"/>
  <text x="470" y="98" text-anchor="middle" font-size="15" fill="#B45309">介质（σ 吸收密度，ε 发射）</text>

  <!-- ray -->
  <line x1="40" y1="150" x2="895" y2="150" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="52" y="136" font-size="16" fill="#334155">入射 L(t₀)</text>
  <text x="790" y="136" font-size="16" fill="#334155">出射 L(t₁)</text>
  <!-- entry/exit ticks -->
  <g stroke="#334155" stroke-width="1.6">
    <line x1="292" y1="140" x2="292" y2="160"/>
    <line x1="648" y1="140" x2="648" y2="160"/>
  </g>
  <text x="292" y="180" text-anchor="middle" font-size="15" fill="#64748B">t₀</text>
  <text x="648" y="180" text-anchor="middle" font-size="15" fill="#64748B">t₁</text>

  <!-- differential slab -->
  <rect x="452" y="112" width="26" height="76" stroke="#2563EB" stroke-width="2" fill="#2563EB" fill-opacity="0.12"/>
  <text x="465" y="205" text-anchor="middle" font-size="15" fill="#2563EB">微元 dt</text>
  <line x1="465" y1="112" x2="465" y2="66" stroke="#334155" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="480" y="62" font-size="16" fill="#334155">dL = ( −σ·L  +  ε ) dt</text>
  <text x="512" y="82" font-size="14" fill="#B45309">吸收扣除</text>
  <text x="616" y="82" font-size="14" fill="#16A34A">发射注入</text>

  <!-- transmittance curve -->
  <g stroke="#334155" stroke-width="1.6" fill="none">
    <line x1="60" y1="380" x2="880" y2="380" marker-end="url(#arr)"/>
    <line x1="60" y1="380" x2="60" y2="252" marker-end="url(#arr)"/>
  </g>
  <text x="46" y="266" font-size="15" fill="#334155">T</text>
  <text x="884" y="398" font-size="15" fill="#334155">t</text>
  <text x="40" y="285" font-size="14" fill="#64748B">1</text>
  <line x1="56" y1="280" x2="64" y2="280" stroke="#334155" stroke-width="1.4"/>
  <path d="M 60 280 L 292 280 C 380 280, 420 296, 470 318 C 520 340, 580 350, 648 353 L 880 353"
        stroke="#2563EB" stroke-width="2.5" fill="none"/>
  <g stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4">
    <line x1="292" y1="280" x2="292" y2="380"/>
    <line x1="648" y1="353" x2="648" y2="380"/>
  </g>
  <text x="296" y="398" text-anchor="middle" font-size="14" fill="#64748B">t₀</text>
  <text x="652" y="398" text-anchor="middle" font-size="14" fill="#64748B">t₁</text>
  <text x="700" y="330" font-size="16" fill="#2563EB">透射率 T(t) = exp(−∫σ ds)</text>
  <text x="700" y="350" font-size="14" fill="#64748B">（Beer–Lambert）</text>
  <text x="80" y="248" font-size="16" fill="#334155">出射 = ∫ T·ε dt（介质自身发光） + T(t₁)·L(t₀)（背景被衰减）</text>
</svg>
