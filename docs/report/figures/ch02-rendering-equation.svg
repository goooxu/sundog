<svg xmlns="http://www.w3.org/2000/svg" width="920" height="510" viewBox="0 0 920 510"
     font-family="'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC','Microsoft YaHei',sans-serif" font-size="17">
  <defs>
    <marker id="arrO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="13" markerHeight="13" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="510" fill="#FFFFFF"/>

  <!-- 渲染方程（各项配色与图中元素对应） -->
  <text x="470" y="46" text-anchor="middle" font-size="21">
    <tspan fill="#2563EB">L_o(x, ω_o)</tspan><tspan fill="#334155"> = </tspan><tspan fill="#B45309">L_e</tspan><tspan fill="#334155"> + ∫ </tspan><tspan fill="#334155" font-weight="bold">f_r</tspan><tspan fill="#334155"> · </tspan><tspan fill="#B45309">L_i(x, ω_i)</tspan><tspan fill="#334155"> · </tspan><tspan fill="#16A34A">cosθ</tspan><tspan fill="#334155"> dω_i</tspan>
  </text>

  <!-- 表面与点 x -->
  <line x1="100" y1="380" x2="820" y2="380" stroke="#334155" stroke-width="3"/>
  <rect x="100" y="380" width="720" height="14" fill="#334155" fill-opacity="0.08"/>
  <circle cx="420" cy="380" r="5.5" fill="#334155"/>
  <text x="420" y="404" text-anchor="middle" fill="#334155" font-style="italic" font-weight="bold">x</text>

  <!-- 半球（虚线） -->
  <path d="M190,380 A230,230 0 0 1 650,380" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="7,6"/>
  <text x="60" y="220" fill="#334155">半球（方向的集合）</text>

  <!-- 法线 -->
  <line x1="420" y1="380" x2="420" y2="205" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="430" y="218" fill="#16A34A">n</text>

  <!-- 多个入射方向（线宽示强弱） -->
  <line x1="194.4" y1="297.9" x2="391.8" y2="369.7" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrO)"/>
  <line x1="223.4" y1="242.2" x2="395.4" y2="362.8" stroke="#F59E0B" stroke-width="1.6" marker-end="url(#arrO)"/>
  <line x1="265.7" y1="196.2" x2="400.7" y2="357.0" stroke="#F59E0B" stroke-width="2.6" marker-end="url(#arrO)"/>
  <line x1="502.1" y1="154.4" x2="430.3" y2="351.8" stroke="#F59E0B" stroke-width="3.6" marker-end="url(#arrO)"/>
  <text x="56" y="120" fill="#B45309">L_i：各方向入射的辐亮度（线宽示强弱）</text>
  <line x1="200" y1="128" x2="262" y2="192" stroke="#B45309" stroke-width="1.3"/>

  <!-- 夹角 θ（法线与某个入射方向） -->
  <path d="M420,325 A55,55 0 0 0 384.6,337.9" fill="none" stroke="#334155" stroke-width="1.6"/>
  <text x="395" y="313" fill="#16A34A">θ</text>

  <!-- 出射方向 → 相机 -->
  <line x1="429" y1="372" x2="636" y2="196" stroke="#2563EB" stroke-width="3" marker-end="url(#arrB)"/>
  <text x="542" y="170" fill="#2563EB">L_o(x,ω_o)</text>
  <rect x="640" y="140" width="80" height="58" fill="none" stroke="#334155" stroke-width="2"/>
  <circle cx="640" cy="198" r="6" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
  <text x="680" y="176" text-anchor="middle" fill="#334155">相机</text>

  <!-- 表面下方标注 -->
  <text x="80" y="442" fill="#334155"><tspan font-weight="bold">f_r</tspan>：点 x 的 BRDF，把入射按比例散射到出射</text>
  <line x1="270" y1="426" x2="405" y2="392" stroke="#334155" stroke-width="1.3"/>
  <text x="600" y="442" fill="#B45309">L_e：自发光（若 x 是光源）</text>
  <line x1="620" y1="426" x2="455" y2="392" stroke="#B45309" stroke-width="1.3"/>

  <!-- 底注 -->
  <text x="460" y="490" text-anchor="middle" fill="#334155">出射辐亮度 = 自发光 + 半球内所有入射光经 BRDF 与 cosθ 加权的总和（对方向积分）</text>
</svg>
