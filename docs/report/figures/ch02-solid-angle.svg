<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460"
     font-family="'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC','Microsoft YaHei',sans-serif" font-size="17">
  <rect x="0" y="0" width="880" height="460" fill="#FFFFFF"/>

  <!-- 球体 -->
  <circle cx="280" cy="250" r="170" fill="#2563EB" fill-opacity="0.08" stroke="#334155" stroke-width="2.5"/>
  <ellipse cx="280" cy="250" rx="170" ry="48" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="5,5"/>

  <!-- 球心 O 与锥 -->
  <circle cx="280" cy="250" r="4.5" fill="#334155"/>
  <text x="272" y="282" text-anchor="middle" fill="#334155">球心 O</text>
  <line x1="280" y1="250" x2="429.8" y2="100.2" stroke="#334155" stroke-width="1.6"/>
  <line x1="280" y1="250" x2="366.2" y2="163.8" stroke="#334155" stroke-width="1.6"/>
  <line x1="280" y1="250" x2="398" y2="132" stroke="#334155" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="322" y="186" fill="#334155" font-style="italic">r</text>

  <!-- 球面上的面积块 A -->
  <g transform="translate(398,132) rotate(-45)">
    <ellipse cx="0" cy="0" rx="45" ry="19" fill="#2563EB" fill-opacity="0.35" stroke="#2563EB" stroke-width="2"/>
  </g>
  <text x="404" y="72" text-anchor="middle" fill="#2563EB">面积 A</text>
  <line x1="404" y1="82" x2="401" y2="112" stroke="#2563EB" stroke-width="1.5"/>

  <!-- 右侧：定义与半球 -->
  <text x="520" y="100" font-size="24" fill="#334155">立体角　<tspan fill="#2563EB">ω = A / r²</tspan></text>
  <text x="520" y="138" fill="#334155">A：球面上的面积块，r：球半径</text>
  <text x="520" y="168" fill="#334155">单位：球面度（sr），大小与 r 无关</text>
  <text x="520" y="198" fill="#334155">类比平面角：θ = 弧长 / 半径（rad）</text>

  <path d="M570,320 A85,85 0 0 1 740,320 Z" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="2"/>
  <line x1="570" y1="320" x2="740" y2="320" stroke="#334155" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="655" y="352" text-anchor="middle" fill="#334155">半球：ω = 2π sr</text>
  <text x="655" y="382" text-anchor="middle" fill="#334155">整个球面：ω = 4π sr</text>

  <!-- 底注 -->
  <text x="440" y="440" text-anchor="middle" fill="#334155">站在球心向外看，一块区域“看起来有多大”—— 立体角度量一组方向的大小</text>
</svg>
