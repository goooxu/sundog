<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="sans-serif">
  <defs>
    <marker id="ar-n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="520" fill="#FFFFFF"/>

  <text x="24" y="36" font-size="20" font-weight="bold" fill="#334155">半球采样的方向密度：朴素做法 vs 余弦加权</text>

  <line x1="450" y1="56" x2="450" y2="448" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- ============ 左：normalize(n + 球内均匀点) ============ -->
  <text x="60" y="80" font-size="17" font-weight="bold" fill="#334155">朴素做法：d = normalize(n + s)</text>
  <text x="60" y="106" font-size="16" fill="#64748B">s 均匀取自单位球内</text>
  <text x="296" y="252" font-size="16" fill="#334155">实测密度（橙）</text>
  <text x="296" y="276" font-size="16" fill="#334155">≠ cosθ/π（虚线）</text>

  <!-- 表面 -->
  <line x1="60" y1="380" x2="400" y2="380" stroke="#334155" stroke-width="3"/>
  <g stroke="#94A3B8" stroke-width="1.2">
    <line x1="80" y1="380" x2="68" y2="394"/><line x1="120" y1="380" x2="108" y2="394"/>
    <line x1="160" y1="380" x2="148" y2="394"/><line x1="200" y1="380" x2="188" y2="394"/>
    <line x1="240" y1="380" x2="228" y2="394"/><line x1="280" y1="380" x2="268" y2="394"/>
    <line x1="320" y1="380" x2="308" y2="394"/><line x1="360" y1="380" x2="348" y2="394"/>
  </g>
  <text x="60" y="404" font-size="16" fill="#94A3B8">表面</text>

  <!-- 有偏密度玫瑰（蒙特卡洛实测，260px = 1/sr） -->
  <polygon points="230.0,380.0 229.6,379.9 228.3,379.6 225.6,378.6 221.4,376.4 215.5,372.4 208.3,366.2 200.4,357.3 192.4,345.6 185.3,331.3 179.8,314.6 176.8,296.4 177.0,278.2 180.1,259.6 186.7,242.6 196.7,229.7 209.0,220.6 222.8,216.0 230.0,215.2 237.2,216.0 251.0,220.6 263.3,229.7 273.3,242.6 279.9,259.6 283.0,278.2 283.2,296.4 280.2,314.6 274.7,331.3 267.6,345.6 259.6,357.3 251.7,366.2 244.5,372.4 238.6,376.4 234.4,378.6 231.7,379.6 230.4,379.9 230.0,380.0"
    fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2.2"/>
  <!-- 参考：cosθ/π（同一比例尺） -->
  <polyline points="230.0,380.0 222.8,379.4 215.8,377.5 209.3,374.5 203.4,370.3 198.3,365.2 194.2,359.3 191.1,352.8 189.2,345.8 188.6,338.6 189.2,331.4 191.1,324.5 194.2,317.9 198.3,312.0 203.4,306.9 209.3,302.8 215.8,299.7 222.8,297.9 230.0,297.2 237.2,297.9 244.2,299.7 250.7,302.8 256.6,306.9 261.7,312.0 265.8,317.9 268.9,324.5 270.8,331.4 271.4,338.6 270.8,345.8 268.9,352.8 265.8,359.3 261.7,365.2 256.6,370.3 250.7,374.5 244.2,377.5 237.2,379.4 230.0,380.0"
    fill="none" stroke="#334155" stroke-width="1.8" stroke-dasharray="6 4"/>

  <!-- 法线 -->
  <line x1="230" y1="380" x2="230" y2="196" stroke="#16A34A" stroke-width="2.4" marker-end="url(#ar-n)"/>
  <text x="240" y="206" font-size="17" font-weight="bold" fill="#16A34A">n</text>

  <!-- 标注 -->
  <text x="46" y="164" font-size="16" fill="#F59E0B">θ=0 处密度约 2 倍</text>
  <line x1="170" y1="170" x2="216" y2="212" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="48" y="350" font-size="16" fill="#F59E0B">掠射方向 → 0</text>
  <text x="48" y="428" font-size="16" fill="#DC2626">但权重按 p = cosθ/π 的完美假设计算 → 有偏</text>

  <!-- ============ 右：余弦加权 ============ -->
  <text x="500" y="80" font-size="17" font-weight="bold" fill="#334155">sundog：cosineHemisphere() 余弦加权</text>
  <text x="500" y="106" font-size="16" fill="#64748B">p(ω) = cosθ/π，f·cosθ/p = albedo</text>

  <line x1="500" y1="380" x2="840" y2="380" stroke="#334155" stroke-width="3"/>
  <g stroke="#94A3B8" stroke-width="1.2">
    <line x1="520" y1="380" x2="508" y2="394"/><line x1="560" y1="380" x2="548" y2="394"/>
    <line x1="600" y1="380" x2="588" y2="394"/><line x1="640" y1="380" x2="628" y2="394"/>
    <line x1="680" y1="380" x2="668" y2="394"/><line x1="720" y1="380" x2="708" y2="394"/>
    <line x1="760" y1="380" x2="748" y2="394"/><line x1="800" y1="380" x2="788" y2="394"/>
  </g>
  <text x="500" y="404" font-size="16" fill="#94A3B8">表面</text>

  <polygon points="670.0,380.0 662.8,379.4 655.8,377.5 649.3,374.5 643.4,370.3 638.3,365.2 634.2,359.3 631.1,352.8 629.2,345.8 628.6,338.6 629.2,331.4 631.1,324.5 634.2,317.9 638.3,312.0 643.4,306.9 649.3,302.8 655.8,299.7 662.8,297.9 670.0,297.2 677.2,297.9 684.2,299.7 690.7,302.8 696.6,306.9 701.7,312.0 705.8,317.9 708.9,324.5 710.8,331.4 711.4,338.6 710.8,345.8 708.9,352.8 705.8,359.3 701.7,365.2 696.6,370.3 690.7,374.5 684.2,377.5 677.2,379.4 670.0,380.0"
    fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2.2"/>

  <line x1="670" y1="380" x2="670" y2="272" stroke="#16A34A" stroke-width="2.4" marker-end="url(#ar-n)"/>
  <text x="680" y="282" font-size="17" font-weight="bold" fill="#16A34A">n</text>
  <text x="724" y="330" font-size="16" fill="#F59E0B">p(ω) = cosθ/π</text>
  <text x="500" y="428" font-size="16" fill="#16A34A">采样分布与加权 pdf 精确匹配 → 无偏</text>

  <text x="450" y="478" font-size="16" fill="#334155" text-anchor="middle">分布与权重不匹配 ⇒ 每次反弹引入固定偏差，spp 再高也不会消失（附录陷阱 2）</text>
  <text x="450" y="504" font-size="16" fill="#64748B" text-anchor="middle">左图密度为 2×10⁶ 样本蒙特卡洛实测，两图同一比例尺</text>
</svg>
