<svg xmlns="http://www.w3.org/2000/svg" width="940" height="580" viewBox="0 0 940 580" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B45309"/>
    </marker>
  </defs>
  <rect width="940" height="580" fill="#ffffff"/>
  <text x="20" y="32" font-size="20" font-weight="bold" fill="#334155">物理装载：从初始条件到烘焙位姿</text>

  <!-- ===== lane 1: scene assembly (PhysX-free) ===== -->
  <text x="20" y="64" font-size="17" font-weight="bold" fill="#2563EB">主机 · 场景装配（零 PhysX 依赖）</text>
  <g stroke="#2563EB" fill="#2563EB" fill-opacity="0.08">
    <rect x="20"  y="74" width="300" height="84" rx="8"/>
    <rect x="356" y="74" width="280" height="84" rx="8"/>
  </g>
  <g font-size="16" fill="#334155">
    <text x="170" y="98"  text-anchor="middle" font-size="17" font-weight="bold">场景 JSON 解析</text>
    <text x="170" y="120" text-anchor="middle">初始位姿 · 初速度 · physics 参数</text>
    <text x="170" y="142" text-anchor="middle" fill="#64748B">scene_json.cpp · 只填纯结构体</text>
    <text x="496" y="98"  text-anchor="middle" font-size="17" font-weight="bold">网格加载</text>
    <text x="496" y="120" text-anchor="middle">OBJ → 顶点（留主机端副本）</text>
    <text x="496" y="142" text-anchor="middle" fill="#64748B">mesh_obj.cpp</text>
  </g>
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="320" y1="116" x2="354" y2="116"/>
    <line x1="496" y1="158" x2="496" y2="196"/>
  </g>

  <!-- ===== PhysX module boundary ===== -->
  <rect x="20" y="198" width="900" height="196" rx="10" stroke="#B45309" stroke-dasharray="6 4" stroke-width="2" fill="#F59E0B" fill-opacity="0.05"/>
  <text x="34" y="224" font-size="17" font-weight="bold" fill="#B45309">runPhysics() · src/physics.cpp —— 全项目唯一接触 PhysX 的翻译单元</text>

  <g stroke="#B45309" fill="#F59E0B" fill-opacity="0.12" stroke-width="1.6">
    <rect x="40"  y="240" width="196" height="96" rx="8"/>
    <rect x="262" y="240" width="196" height="96" rx="8"/>
    <rect x="484" y="240" width="196" height="96" rx="8"/>
    <rect x="706" y="240" width="196" height="96" rx="8"/>
  </g>
  <g font-size="15" fill="#334155">
    <text x="138" y="264" text-anchor="middle" font-size="16" font-weight="bold">T·R·S 分解</text>
    <text x="138" y="286" text-anchor="middle">列范数提缩放</text>
    <text x="138" y="306" text-anchor="middle">拒剪切 / 镜像</text>
    <text x="138" y="326" text-anchor="middle" fill="#64748B">decompose()</text>
    <text x="360" y="264" text-anchor="middle" font-size="16" font-weight="bold">碰撞世界装配</text>
    <text x="360" y="286" text-anchor="middle">凸包 ≤64 顶点 · 薄盒</text>
    <text x="360" y="306" text-anchor="middle">actor 按场景顺序</text>
    <text x="360" y="326" text-anchor="middle" fill="#64748B">GPU 动力学 + GPU 宽相</text>
    <text x="582" y="264" text-anchor="middle" font-size="16" font-weight="bold">模拟循环</text>
    <text x="582" y="286" text-anchor="middle">simulate / fetchResults</text>
    <text x="582" y="306" text-anchor="middle">固定 dt = 1/240 s</text>
    <text x="582" y="326" text-anchor="middle" fill="#64748B">在 RTX GPU 上求解</text>
    <text x="804" y="264" text-anchor="middle" font-size="16" font-weight="bold">位姿烘焙</text>
    <text x="804" y="286" text-anchor="middle">M′ = T′·R′·S</text>
    <text x="804" y="306" text-anchor="middle">写回对象 xform</text>
    <text x="804" y="326" text-anchor="middle" fill="#64748B">bakePose()</text>
  </g>
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="236" y1="288" x2="260" y2="288"/>
    <line x1="458" y1="288" x2="482" y2="288"/>
    <line x1="680" y1="288" x2="704" y2="288"/>
  </g>
  <path d="M 632 336 C 660 360, 560 366, 542 340" stroke="#B45309" stroke-width="2" fill="none" marker-end="url(#arrB)"/>
  <text x="582" y="376" text-anchor="middle" font-size="15" fill="#B45309">直到全体休眠 · 或 stop_time 定格</text>

  <!-- ===== lane 3: downstream ===== -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M 804 394 L 804 424 L 530 424 L 530 444"/>
    <line x1="656" y1="482" x2="690" y2="482"/>
  </g>
  <g stroke="#2563EB" fill="#2563EB" fill-opacity="0.08">
    <rect x="404" y="446" width="252" height="72" rx="8"/>
    <rect x="692" y="446" width="228" height="72" rx="8"/>
  </g>
  <g font-size="16" fill="#334155">
    <text x="530" y="474" text-anchor="middle" font-size="17" font-weight="bold">构建 GAS / IAS</text>
    <text x="530" y="500" text-anchor="middle" fill="#64748B">accel.cpp · 第 8 章</text>
    <text x="806" y="474" text-anchor="middle" font-size="17" font-weight="bold">渲染</text>
    <text x="806" y="500" text-anchor="middle" fill="#64748B">对物理一无所知</text>
  </g>

  <text x="20" y="556" font-size="15" fill="#64748B">模拟与渲染共用同一块 GPU，先模拟、后渲染串行执行；物理耗时计入 stats 的 physics 分段，不进 render 口径（第 11 章）。</text>
</svg>
