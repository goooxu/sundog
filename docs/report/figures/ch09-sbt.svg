<svg xmlns="http://www.w3.org/2000/svg" width="960" height="450" viewBox="0 0 960 450" font-family="sans-serif">
  <defs>
    <marker id="ar-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="450" fill="#FFFFFF"/>

  <text x="24" y="36" font-size="20" font-weight="bold" fill="#334155">着色器绑定表（SBT）内存布局</text>

  <!-- 分区标题 -->
  <text x="40" y="96" font-size="16" fill="#64748B">raygen ×1</text>
  <text x="150" y="96" font-size="16" fill="#64748B">miss ×2</text>
  <text x="312" y="96" font-size="16" fill="#64748B">hitgroup 记录（每实例 2 条：radiance + shadow）</text>

  <!-- hitgroup 下标 -->
  <text x="360" y="124" font-size="16" fill="#334155" text-anchor="middle">0</text>
  <text x="460" y="124" font-size="16" fill="#334155" text-anchor="middle">1</text>
  <text x="560" y="124" font-size="16" fill="#334155" text-anchor="middle">2</text>
  <text x="660" y="124" font-size="16" fill="#334155" text-anchor="middle">3</text>
  <text x="760" y="124" font-size="16" fill="#334155" text-anchor="middle">4</text>
  <text x="860" y="124" font-size="16" fill="#334155" text-anchor="middle">5</text>

  <!-- 条带 -->
  <rect x="40" y="130" width="90" height="80" fill="#2563EB" fill-opacity="0.15" stroke="#334155" stroke-width="1.8"/>
  <text x="85" y="162" font-size="16" fill="#334155" text-anchor="middle">raygen</text>
  <text x="85" y="188" font-size="16" fill="#334155" text-anchor="middle">记录</text>

  <rect x="130" y="130" width="90" height="80" fill="#94A3B8" fill-opacity="0.18" stroke="#334155" stroke-width="1.8"/>
  <text x="175" y="162" font-size="16" fill="#334155" text-anchor="middle">miss 0</text>
  <text x="175" y="188" font-size="16" fill="#334155" text-anchor="middle">radiance</text>

  <rect x="220" y="130" width="90" height="80" fill="#94A3B8" fill-opacity="0.18" stroke="#334155" stroke-width="1.8"/>
  <text x="265" y="162" font-size="16" fill="#334155" text-anchor="middle">miss 1</text>
  <text x="265" y="188" font-size="16" fill="#334155" text-anchor="middle">shadow</text>

  <rect x="310" y="130" width="100" height="80" fill="#16A34A" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <text x="360" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 0</text>
  <text x="360" y="188" font-size="16" fill="#334155" text-anchor="middle">radiance</text>

  <rect x="410" y="130" width="100" height="80" fill="#16A34A" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <text x="460" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 1</text>
  <text x="460" y="188" font-size="16" fill="#334155" text-anchor="middle">shadow</text>

  <rect x="510" y="130" width="100" height="80" fill="#F59E0B" fill-opacity="0.12" stroke="#334155" stroke-width="1.8"/>
  <text x="560" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 2</text>
  <text x="560" y="188" font-size="16" fill="#334155" text-anchor="middle">radiance</text>

  <rect x="610" y="130" width="100" height="80" fill="#F59E0B" fill-opacity="0.12" stroke="#334155" stroke-width="1.8"/>
  <text x="660" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 3</text>
  <text x="660" y="188" font-size="16" fill="#334155" text-anchor="middle">shadow</text>

  <rect x="710" y="130" width="100" height="80" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <text x="760" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 4</text>
  <text x="760" y="188" font-size="16" fill="#334155" text-anchor="middle">radiance</text>

  <rect x="810" y="130" width="100" height="80" fill="#2563EB" fill-opacity="0.10" stroke="#334155" stroke-width="1.8"/>
  <text x="860" y="162" font-size="16" fill="#334155" text-anchor="middle">HG 5</text>
  <text x="860" y="188" font-size="16" fill="#334155" text-anchor="middle">shadow</text>

  <!-- 高亮 HG 3 -->
  <rect x="610" y="130" width="100" height="80" fill="none" stroke="#DC2626" stroke-width="3"/>

  <!-- 实例分组 -->
  <path d="M 315 218 L 315 226 L 505 226 L 505 218" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="410" y="248" font-size="16" fill="#334155" text-anchor="middle">实例 0（奶牛）</text>
  <path d="M 515 218 L 515 226 L 705 226 L 705 218" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="248" font-size="16" fill="#334155" text-anchor="middle">实例 1（奶牛）</text>
  <path d="M 715 218 L 715 226 L 905 226 L 905 218" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="810" y="248" font-size="16" fill="#334155" text-anchor="middle">实例 2（球）</text>

  <!-- 寻址算式 -->
  <text x="40" y="308" font-size="17" font-weight="bold" fill="#2563EB">hitgroup 记录下标 = sbtOffset(实例) + 光线类型 = 2 × instanceId + rayType</text>
  <text x="40" y="338" font-size="16" fill="#334155">rayType：radiance = 0，shadow = 1（由 optixTrace 的 SBT offset / stride 参数选择）</text>
  <text x="40" y="368" font-size="16" fill="#334155">例：实例 1 的 shadow 光线 → 2 × 1 + 1 = 3 号记录（红框）</text>
  <line x1="720" y1="356" x2="664" y2="216" stroke="#DC2626" stroke-width="1.8" marker-end="url(#ar-hl)"/>

  <text x="40" y="424" font-size="16" fill="#64748B">每条 HitRecord = header + 数据（geomKind、matFront/Back、lightId、纹理与网格指针）</text>
</svg>
